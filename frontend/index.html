<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Service Chatbot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chatbot-container">
        <!-- Header -->
        <div class="chatbot-header">
            <div class="header-content">
                <h1>Customer Support</h1>
                <p id="userWelcome" style="font-size: 12px; margin-top: 5px; opacity: 0.9;">Welcome!</p>
            </div>
            <div style="display: flex; gap: 10px;">
                <button type="button" class="minimize-btn" id="logoutBtn" title="Logout">🚪</button>
                <button type="button" class="minimize-btn" id="endBtn" title="Clear chat">✖</button>
                <button type="button" class="minimize-btn" id="minimizeBtn">−</button>
            </div>
        </div>

        <!-- Chat Messages Area -->
        <div class="chat-messages" id="chatMessages">
            <div class="message bot-message">
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    <p>Hello! Welcome to our Customer Support. How can I help you today?</p>
                </div>
                <button type="button" id="historyBtn" class="minimize-btn">📜</button>
            </div>
        </div>
        <!-- CHAT HISTORY PANEL -->
<div id="historyPanel" style="
    display:none;
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:white;
    z-index:999;
    padding:20px;
    overflow-y:auto;
">
    <h2>Chat History</h2>
    <div id="historyContent"></div>
    <button id="closeHistory" class="btn-primary" style="margin-top:20px;">Close</button>
</div>

<!-- ESCALATION DIALOG MODAL -->
<div id="escalationModal" style="
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    z-index:10000;
    display:flex;
    justify-content:center;
    align-items:center;
">
    <div style="
        background:white;
        border-radius:12px;
        padding:30px;
        max-width:400px;
        width:90%;
        box-shadow:0 8px 24px rgba(0,0,0,0.15);
        text-align:center;
    ">
        <h2 style="color:#333; margin-bottom:15px;">Need Human Support?</h2>
        <p style="color:#666; margin-bottom:20px;">It looks like your question needs specialized help. Would you like to chat with one of our human agents?</p>
        <div style="display:flex; gap:10px; justify-content:center;">
            <button id="continueWithBot" class="btn-secondary" style="
                padding:10px 20px;
                border:none;
                border-radius:6px;
                cursor:pointer;
                font-weight:600;
                background:#f0f0f0;
                color:#333;
                transition:all 0.3s;
            ">Continue with Bot</button>
            <button id="escalateToAgent" class="btn-primary" style="
                padding:10px 20px;
                border:none;
                border-radius:6px;
                cursor:pointer;
                font-weight:600;
                background:#667eea;
                color:white;
                transition:all 0.3s;
            ">Chat with Agent</button>
        </div>
    </div>
</div>
        <!-- Input Area -->
        <div class="chat-input-area">
            <div class="quick-options" id="quickOptions">
                <button type="button" class="quick-btn" data-message="Track my order">📦 Track Order</button>
                <button type="button" class="quick-btn" data-message="Return policy">↩️ Returns</button>
                <button type="button" class="quick-btn" data-message="Technical support">🔧 Tech Help</button>
                <button type="button" class="quick-btn" data-message="Contact sales">💬 Sales</button>
            </div>

            <form id="chatForm" onsubmit="return false;">
                <div class="input-section">
                    <input 
                        type="text" 
                        id="userInput" 
                        placeholder="Type your message here..." 
                        class="chat-input"
                        autocomplete="off"
                    >
                    <button type="button" class="send-btn" id="sendBtn">
                        <span>Send</span>
                        <span class="send-icon">➤</span>
                    </button>
                </div>
            </form>
        </div>

        <!-- Footer -->
        <div class="chatbot-footer">
            <p>Powered by AI Support • Available 24/7</p>
        </div>
    </div>
    
    <!-- ESCALATION CHAT PANEL -->
    <div id="escalationChatPanel" style="
        display:none;
        position:absolute;
        top:0;
        left:0;
        width:100%;
        height:100%;
        background:white;
        z-index:998;
        flex-direction:column;
        border-radius:12px;
    ">
        <div style="
            background:#667eea;
            color:white;
            padding:15px;
            border-radius:12px 12px 0 0;
            display:flex;
            justify-content:space-between;
            align-items:center;
        ">
            <h2 style="margin:0; font-size:16px;">Chat with Agent</h2>
            <button id="closeEscalation" type="button" style="
                background:none;
                border:none;
                color:white;
                font-size:20px;
                cursor:pointer;
            ">✕</button>
        </div>
        
        <div id="escalationMessages" style="
            flex:1;
            overflow-y:auto;
            padding:15px;
            background:#f9f9f9;
        "></div>
        
        <div style="
            padding:15px;
            border-top:1px solid #ddd;
            display:flex;
            gap:10px;
        ">
            <input type="text" id="escalationInput" placeholder="Type your message..." style="
                flex:1;
                padding:10px;
                border:1px solid #ddd;
                border-radius:6px;
                font-size:14px;
            ">
            <button id="escalationSendBtn" type="button" style="
                padding:10px 20px;
                background:#667eea;
                color:white;
                border:none;
                border-radius:6px;
                cursor:pointer;
                font-weight:600;
            ">Send</button>
        </div>
    </div>

    
    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
